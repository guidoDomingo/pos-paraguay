  <rect x="200" y="348" width="112" height="12" rx="6" fill="#fff" opacity="0.5"/>
  <!-- Teclado numérico (cajero) -->
  <rect x="148" y="382" width="216" height="72" rx="12" fill="#fff" opacity="0.18"/>
  <!-- Teclas -->
  <rect x="162" y="394" width="36" height="20" rx="5" fill="#fff" opacity="0.7"/>
  <rect x="206" y="394" width="36" height="20" rx="5" fill="#fff" opacity="0.7"/>
  <rect x="250" y="394" width="36" height="20" rx="5" fill="#fff" opacity="0.7"/>
  <rect x="294" y="394" width="36" height="20" rx="5" fill="#198754" opacity="0.85"/>
  <rect x="162" y="422" width="36" height="20" rx="5" fill="#fff" opacity="0.7"/>
  <rect x="206" y="422" width="36" height="20" rx="5" fill="#fff" opacity="0.7"/>
  <rect x="250" y="422" width="80" height="20" rx="5" fill="#0dcaf0" opacity="0.85"/>
