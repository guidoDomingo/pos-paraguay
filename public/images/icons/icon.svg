<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo -->
  <rect width="512" height="512" rx="80" fill="#0d6efd"/>
  <!-- Monitor / POS terminal -->
  <rect x="96" y="130" width="320" height="200" rx="16" fill="#fff" opacity="0.15"/>
  <rect x="112" y="146" width="288" height="168" rx="8" fill="#fff" opacity="0.9"/>
  <!-- Pantalla interna (líneas de factura) -->
  <rect x="132" y="166" width="120" height="10" rx="4" fill="#0d6efd" opacity="0.6"/>
  <rect x="132" y="184" width="80" height="8" rx="4" fill="#0d6efd" opacity="0.4"/>
  <rect x="132" y="200" width="100" height="8" rx="4" fill="#0d6efd" opacity="0.4"/>
  <rect x="132" y="216" width="60" height="8" rx="4" fill="#0d6efd" opacity="0.4"/>
  <!-- Precio / monto -->
  <rect x="280" y="166" width="100" height="24" rx="6" fill="#198754" opacity="0.85"/>
  <rect x="290" y="200" width="80" height="8" rx="4" fill="#0d6efd" opacity="0.35"/>
  <rect x="290" y="216" width="80" height="8" rx="4" fill="#0d6efd" opacity="0.35"/>
  <rect x="290" y="232" width="80" height="16" rx="4" fill="#0d6efd" opacity="0.6"/>
