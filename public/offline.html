<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión – Sistema POS Paraguay</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d6efd;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 16px;
            padding: 48px 32px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(12px);
        }
        .icon { font-size: 72px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        p { font-size: 15px; opacity: 0.85; line-height: 1.6; margin-bottom: 28px; }
        button {
            background: #fff;
            color: #0d6efd;
            border: none;
            border-radius: 8px;
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>Sin conexión a Internet</h1>
        <p>Verifica tu conexión a red e intenta de nuevo. Algunas funciones pueden estar disponibles desde el caché.</p>
        <button onclick="window.location.reload()">Reintentar</button>
    </div>
</body>
</html>
